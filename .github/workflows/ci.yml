name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with: { go-version: '1.26.x' }
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - run: go test ./...
      - run: make build
  frontend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22.x', cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm --prefix frontend ci
      - run: npm --prefix frontend run build
  shell:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@v2
        with: { scandir: scripts }
  package:
    needs: [backend, frontend, shell]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with: { go-version: '1.26.x' }
      - uses: actions/setup-node@v4
        with: { node-version: '22.x', cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: make package
      - uses: actions/upload-artifact@v4
        with: { name: netbird-fnos-provisional-package, path: dist/netbird-fnos-provisional.tar.gz }
